name: CI/CD Pipeline

on:
  # Executa na main
  push:
    branches: [main]
  # Executa em PRs
  pull_request:

jobs:
  # Etapa de empacotamento
  build:
    name: Build Package
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      # Configura o Java
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # Gera o JAR
      - name: Build JAR with Maven
        run: mvn -B clean package -DskipTests

      # Publica o artefato
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v6
        with:
          name: application-jar
          path: target/*.jar
          if-no-files-found: error

  # Etapa de testes
  test:
    name: Unit Tests
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run unit tests
        run: mvn -B clean test

      - name: Generate test summary
        if: always()
        shell: bash
        run: |
          if ! compgen -G "target/surefire-reports/*.xml" > /dev/null; then
            echo "## Test Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "JUnit reports not found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from glob import glob
          from pathlib import Path

          tests = failures = errors = skipped = 0

          for report in glob("target/surefire-reports/*.xml"):
              root = ET.parse(report).getroot()

              if root.tag == "testsuite":
                  suites = [root]
              else:
                  suites = root.findall("testsuite")

              for suite in suites:
                  tests += int(suite.attrib.get("tests", 0))
                  failures += int(suite.attrib.get("failures", 0))
                  errors += int(suite.attrib.get("errors", 0))
                  skipped += int(suite.attrib.get("skipped", 0))

          passed = tests - failures - errors - skipped

          summary_lines = [
              "## Test Report",
              "",
              "| Metric | Value |",
              "| --- | ---: |",
              f"| Total tests | {tests} |",
              f"| Passed | {passed} |",
              f"| Failures | {failures} |",
              f"| Errors | {errors} |",
              f"| Skipped | {skipped} |",
          ]

          summary = "\n".join(summary_lines) + "\n"
          Path("test-summary.md").write_text(summary, encoding="utf-8")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary_file:
              summary_file.write(summary)
          PY

      - name: Upload raw test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: surefire-reports
          path: |
            target/surefire-reports/
            test-summary.md
          if-no-files-found: warn
          retention-days: 7

  # Etapa de cobertura
  coverage:
    name: Code Coverage
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests with JaCoCo
        run: mvn -B clean verify

      - name: Generate coverage summary table
        if: always()
        shell: bash
        run: |
          if [ ! -f target/site/jacoco/jacoco.xml ]; then
            echo "## Coverage Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "JaCoCo report not found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report_path = Path("target/site/jacoco/jacoco.xml")
          root = ET.parse(report_path).getroot()

          counters = {
              counter.attrib["type"]: (
                  int(counter.attrib["missed"]),
                  int(counter.attrib["covered"]),
              )
              for counter in root.findall("counter")
          }

          rows = []
          for metric in ("LINE", "BRANCH", "METHOD"):
              missed, covered = counters.get(metric, (0, 0))
              total = missed + covered
              coverage = (covered / total * 100) if total else 0.0
              rows.append((metric.title(), covered, missed, total, coverage))

          summary_lines = [
              "## Coverage Report",
              "",
              "| Metric | Covered | Missed | Total | Coverage |",
              "| --- | ---: | ---: | ---: | ---: |",
          ]

          for metric, covered, missed, total, coverage in rows:
              summary_lines.append(
                  f"| {metric} | {covered} | {missed} | {total} | {coverage:.2f}% |"
              )

          summary = "\n".join(summary_lines) + "\n"
          Path("coverage-summary.md").write_text(summary, encoding="utf-8")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary_file:
              summary_file.write(summary)
          PY

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: jacoco-report
          path: |
            target/site/jacoco/
            coverage-summary.md
          if-no-files-found: warn
          retention-days: 7

  # Etapa de deploy no GitHub Pages
  deploy-site:
    name: Deploy Site to GitHub Pages
    needs: [test, coverage]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # Gera a page com relatorios de testes e cobertura
      - name: Generate Maven site
        run: mvn clean verify site

      - name: Upload site to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Etapa de notificacao
  notify:
    name: Notification
    needs: [deploy-site]
    if: always() && needs.deploy-site.result != 'skipped'
    runs-on: ubuntu-latest
    environment: github-pages
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Run notification script
        env:
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DEPLOY_STATUS: ${{ needs.deploy-site.result }}
        run: sh src/notify.sh